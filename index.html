<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thumbnail Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500&display=swap" rel="stylesheet">

<style>
body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
}

.controls {
  width: 100%;
  height: auto;
  margin: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

}

#showSelect {
  width: 80%;
  height: 50px;
  margin-bottom: 20px;
  font-weight: 600;
  font-size: 16px;
  border-radius: 10px;
}

#commentatorWrap select {
  width: 100%;
  height: 50px;
  font-weight: 600;
  font-size: 16px;
  border-radius: 10px;
}

#bgUploads{
  display: flex;
  gap: 20px;
}

.previewStage {
  position: relative;
  width: min(95vw, 1100px);
  display: block;
  margin-bottom: 70px;
  overflow: visible;
}

.previewStage.square {
  width: min(95vw, 900px);
}

.previewScale {
  position: absolute;
  top: 0;
  left: 50%;
  display: block;
  transform-origin: top center;
}


#thumbnailYT{
  position: relative;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #000;
  outline: 10px solid yellow;
  margin-bottom: 0;
}

#photoYT {
  position: absolute;
  top: 0;
  left: 0;
  width: 1920px;
  height: 1080px;
  object-fit: cover;
  object-position: center;
}

#photoIG {
  position: absolute;
  top: 50%;
  left: 50%;
  height: 100%;
  width: auto;
  transform: translate(-50%, -50%);
  min-width: 100%;
}

#thumbnailIG{
  position: relative;
  width: 3000px;
  height: 3000px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  justify-content: center;
  justify-items: center;
  outline: 10px solid yellow;
}

#titleTextYT {
  position: absolute;
  width: 890px;
  top: 620px;
  right: 117px;
  text-align: right;
  color: white;
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 73px;
  line-height: 1.1;
  white-space: pre-line;
  letter-spacing: -0.5px;
}
#commentatorTextYT {
  position: absolute;
  width: 840px;
  top: 930px;
  right: 117px;
  text-align: right;
  color: white;
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 40px;
  line-height: 1.1;
  white-space: pre-line;
  letter-spacing: -0.5px;
}

#titleTextIG {
  position: absolute;
  width: 2550px;
  height: auto;
  top: 2520px;
  left: 50%;
  text-align: center;
  color: rgb(0, 0, 0);
  transform: translate(-50%, -50%);
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 180px;
  line-height: 1.1;
  white-space: pre-line;
  color: rebeccapurple;
}
#commentatorTextIG {
  position: absolute;
  width: 2550px;
  height: auto;
  top: 2820px;
  left: 50%;
  text-align: center;
  color: rgb(0, 0, 0);
  transform: translate(-50%, -50%);
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 90px;
  line-height: 1;
  white-space: pre-line;
}

#footerTextIG {
  position: absolute;
  width: 2550px;
  height: auto;
  top: 2850px;
  left: 50%;
  text-align: center;
  color: black;
  transform: translate(-50%, -50%);
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 83px;
  line-height: 1;
  white-space: pre-wrap;
  color: #a5a5a5;
}

#styleIndicator {
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 28px;
  padding: 12px 20px;
  text-align: center;
  align-content: center;
  border-radius: 8px;
  margin-top: 10px;
  color: white;
}

.style-1 {
  background-color: #2ecc71;
}

.style-2 {
  background-color: #e74c3c;
}

.style-3 {
  background-color: #3c72e7;
}

.controls *{
  width: 80%;
  height: 50px;
  margin-bottom: 20px;
  justify-self: center;
  font-weight: 600;
  font-size: 16px;
  border-radius: 10px;
}


#bgUploadYT::file-selector-button, #bgUploadIG::file-selector-button {
  width: 100%;
  height: 50px;
}

#titleInput{
  margin-top: 30px;
}

#photoPositionControls {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 80%;
  margin-bottom: 20px;
  gap: 8px;
  height: auto;
} 

#photoPositionControls label {
  color: #aaa;
  font-size: 14px;
  font-weight: 600;
  width: auto;
  height: auto;
  margin-bottom: 0;
}

#photoSlider {
  width: 100%;
  height: 70px;
  margin-bottom: 20px;
  cursor: pointer;
}

#photoNudgeButtons {
  display: flex;
  gap: 8px;
  width: 100%;
  height: 70px;
  margin-bottom: 0;
}

#photoNudgeButtons button {
  flex: 1;
  height: 70px;
  font-size: 13px;
  background-color: #333;
  color: white;
  border: 1px solid #555;
  cursor: pointer;
  margin-bottom: 0;
  width: auto;
}

#downloadSeparate{
  display: flex;
  gap: 20px;
  height: 35px;
}
#downloadSeparate *{
  height: 35px;
  background-color: rgb(193, 193, 193);
  font-size: 13px;
}




</style>
</head>

<body>

<div class="controls">
  <select id="showSelect">
    <option value="">Select show</option>
    <option value="PS">PS</option>
    <option value="UC">UC</option>
    <option value="ZS">ZS</option>
    <option value="XT">XT</option>
  </select>

  <div id="commentatorWrap" style="display:none; width:80%;">
    <select id="commentatorSelect">
      <option value="">Select commentator</option>
      <option value="Karolina Stonjeková">Karolina Stonjeková</option>
      <option value="Petr Holec">Petr Holec</option>
      <option value="Petr Kolář">Petr Kolář</option>
    </select>
  </div>

  <div id="bgUploads">
    <input type="file" id="bgUploadYT" accept="image/*">
    <input type="file" id="bgUploadIG" accept="image/*">
  </div>
  
  <textarea id="titleInput" rows="3" cols="40" placeholder="Enter title"></textarea>

  <div id="photoPositionControls">
    <label>PHOTO POSITION</label>
    <input type="range" id="photoSlider" min="-860" max="-140" value="-720" oninput="setPhotoOffset(parseInt(this.value))">
    <div id="photoNudgeButtons">
      <button onclick="nudgePhoto(-5)">◀◀ 5px</button>
      <button onclick="nudgePhoto(-2)">◀ 2px</button>
      <button onclick="nudgePhoto(2)">2px ▶</button>
      <button onclick="nudgePhoto(5)">5px ▶▶</button>
    </div>
  </div>

  <div id="styleIndicator">1 LINE</div>

  <button id="generateBtn" onclick="generate()">Generate</button>
    <div id="downloadSeparate" >
      <button id="downloadYTBtn" onclick="downloadYT()">Download YT</button>
      <button onclick="downloadIG()">Download IG</button>
    </div>
  <button id="downloadBothBtn" onclick="downloadBoth()">Download</button>

</div>

<div class="previewStage" id="previewStageYT">
  <div class="previewScale" id="previewScaleYT">
    <div id="thumbnailYT">
        <img id="photoYT" src="" style="display:none;">
        <img id="graphicsOverlayYT" src="UC_Graphics.png" style="position:absolute;top:0;left:0;width:1920px;height:1080px;pointer-events:none;">
        <div id="titleTextYT"></div>
        <div id="commentatorTextYT"></div>
    </div>
  </div>
</div>

<div class="previewStage square">
  <div class="previewScale" id="previewScaleIG">
    <div id="thumbnailIG">
        <img id="photoIG" src="" style="display:none;">
        <img id="graphicsOverlayIG" src="UC_Graphics.png" style="position:absolute;top:0;left:0;width:3000px;height:3000px;pointer-events:none;">
        <div id="titleTextIG"></div>
        <div id="commentatorTextIG"></div>
        <div id="footerTextIG"></div>
    </div>
  </div>
</div>



<script>

let bgImageYT = "";
let bgImageIG = "";
let bgNameYT = "thumbnail";
let bgNameIG = "thumbnail";
let photoOffsetYT = 0;

let currentShow = "";
let currentGraphicsYT = "";
let currentGraphicsIG = "";
let currentCommentator = "";

function formatFooterDate(date) {
  const day = String(date.getDate()).padStart(2, "0");
  const month = date.getMonth() + 1;
  const year = String(date.getFullYear());
  return `${day}. ${month}. ${year}`;
}

function getFooterShowName(showCode) {
  const showNames = {
    PS: "PODTRŽENO SEČTENO",
    UC: "ÚČET",
    ZS: "ZA STRANU A ZA LIDI",
    XT: "X TALK"
  };

  return showNames[showCode] || "SHOW";
}

function updateGraphicsByShow() {
  const ytOverlay = document.getElementById("graphicsOverlayYT");
  const igOverlay = document.getElementById("graphicsOverlayIG");

  if (!currentShow) {
    ytOverlay.removeAttribute("src");
    igOverlay.removeAttribute("src");
    return;
  }

  currentGraphicsYT = `${currentShow}_Graphics_YT.png`;
  currentGraphicsIG = `Graphics_IG.png`;

  ytOverlay.src = currentGraphicsYT;
  igOverlay.src = currentGraphicsIG;
}

function updateCommentatorVisibility() {
  const wrap = document.getElementById("commentatorWrap");
  const select = document.getElementById("commentatorSelect");

  if (currentShow === "PS") {
    wrap.style.display = "block";
  } else {
    wrap.style.display = "none";
    select.value = "";
    currentCommentator = "";
  }
}

function updateYTVisibility() {
  const ytPreview = document.getElementById("previewStageYT");
  const downloadYTBtn = document.getElementById("downloadYTBtn");
  const downloadBothBtn = document.getElementById("downloadBothBtn");

  const hideYT = currentShow === "ZS";

  ytPreview.style.display = hideYT ? "none" : "block";
  downloadYTBtn.style.display = hideYT ? "none" : "inline-block";
  downloadBothBtn.style.display = hideYT ? "none" : "block";

  updatePreviewScales();
}

function syncPSImageToIG() {
  if (currentShow !== "PS" || !bgImageYT) return;

  bgImageIG = bgImageYT;
  bgNameIG = bgNameYT;

  const photoElIG = document.getElementById("photoIG");
  photoElIG.src = bgImageIG;
  photoElIG.style.display = "block";

  applyPhotoOffset();
}

document.getElementById("bgUploadYT").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  bgNameYT = file.name.replace(/\.[^/.]+$/, "");

  reader.onload = function(event) {
    bgImageYT = event.target.result;
    const photoEl = document.getElementById("photoYT");
    photoEl.src = bgImageYT;
    photoEl.style.display = "block";
    // reset offset on new image
    photoOffsetYT = -720;
    document.getElementById("photoSlider").value = photoOffsetYT;
    applyPhotoOffset();
    syncPSImageToIG();
  };

  reader.readAsDataURL(file);
});

document.getElementById("bgUploadIG").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  // store file name without extension
  bgNameIG = file.name.replace(/\.[^/.]+$/, "");

  reader.onload = function(event) {
    bgImageIG = event.target.result;
    const photoElIG = document.getElementById("photoIG");
    photoElIG.src = bgImageIG;
    photoElIG.style.display = "block";
    applyPhotoOffset();
  };

  reader.readAsDataURL(file);
});

document.getElementById("showSelect").addEventListener("change", function(e) {
  currentShow = e.target.value;
  updateGraphicsByShow();
  updateCommentatorVisibility();
  updateYTVisibility();
  syncPSImageToIG();
  generate();
});

document.getElementById("commentatorSelect").addEventListener("change", function(e) {
  currentCommentator = e.target.value;
  generate();
});

// Auto-generate instantly when text changes
const titleInput = document.getElementById("titleInput");

titleInput.addEventListener("input", function() {
  generate();
});

function applyPhotoOffset() {
  const photoEl = document.getElementById("photoYT");
  const photoElIG = document.getElementById("photoIG");

  photoEl.style.left = photoOffsetYT + "px";

  // scale offset proportionally for IG canvas
  const scale = 3000 / 1920;
  const igOffset = photoOffsetYT * scale;

  if (photoElIG) {
    photoElIG.style.transform = "translate(calc(-50% + " + igOffset + "px), -50%)";
  }
}

function setPhotoOffset(val) {
  photoOffsetYT = val;
  applyPhotoOffset();
}

function nudgePhoto(amount) {
  const min = -860;
  const max = -40;

  photoOffsetYT = Math.max(min, Math.min(max, photoOffsetYT + amount));

  document.getElementById("photoSlider").value = photoOffsetYT;

  applyPhotoOffset();
}

function generate() {
  const rawInput = document.getElementById("titleInput").value.trim();
  const originalText = rawInput;
  const upperText = rawInput.toUpperCase();
  const titleElementYT = document.getElementById("titleTextYT");
  const titleElementIG = document.getElementById("titleTextIG");
  const commentatorElementYT = document.getElementById("commentatorTextYT");
  const commentatorElementIG = document.getElementById("commentatorTextIG");
  const footerElementIG = document.getElementById("footerTextIG");
  const indicator = document.getElementById("styleIndicator");

  // Add quotes as one single text
  titleElementYT.textContent = "„" + upperText + ".“";
  // Instagram uses uppercase by default
  titleElementIG.textContent = upperText;
  titleElementYT.style.whiteSpace = "pre-line";
  titleElementIG.style.letterSpacing = "0px";
  titleElementIG.style.top = "2520px";

  const commentatorText = currentShow === "PS" && currentCommentator ? currentCommentator : "";
  commentatorElementYT.textContent = commentatorText;
  commentatorElementIG.textContent = commentatorText;

  const footerShow = getFooterShowName(currentShow);
  const footerDate = formatFooterDate(new Date());
  footerElementIG.textContent = footerShow + " " + " " + " " + "|" + " " + " " + " " + footerDate;

  // Set YT default style
  titleElementYT.style.fontSize = "73px";
  const photoYT = document.getElementById("photoYT");
  if (currentShow === "UC") {
    photoYT.style.display = "none";
  } else if (bgImageYT) {
    photoYT.style.display = "block";
  }

  indicator.className = "";
  indicator.textContent = "1 LINE";
  indicator.classList.add("style-1");

  // Wait for DOM update to check overflow
  // Get the computed style height for 1 line, 2 lines, and 3 lines
  // We'll use the clientHeight of the titleElement to compare
  // Height threshold for 1 line: allow up to 1 line of text at 73px, etc.
  // The element's height should not exceed 1x, 2x, or 3x of its font size * line-height
  // Use requestAnimationFrame to wait for the DOM to update
  const forceZS3Line = currentShow === "ZS";

  requestAnimationFrame(() => {
    // Get computed line height in px
    const computedStyle = window.getComputedStyle(titleElementYT);
    const fontSize1 = 73, fontSize2 = 60, fontSize3 = 52, fontSize3_IG = 140;
    const lineHeight = parseFloat(computedStyle.lineHeight) || 1.1 * fontSize1;

    if (forceZS3Line) {
      titleElementYT.style.fontSize = fontSize3 + "px";
      titleElementIG.style.fontSize = fontSize3_IG + "px";
      titleElementIG.textContent = originalText;
      indicator.className = "";
      indicator.textContent = "3 LINE";
      indicator.classList.add("style-3");
      return;
    }

    // The titleElement's clientHeight
    let h = titleElementYT.clientHeight;
    // For 1 line: should fit within 1 line
    let fits = h <= Math.ceil(lineHeight * 1.05); // small fudge
    if (!fits) {
      // Try 2 Line style
      titleElementYT.style.fontSize = fontSize2 + "px";
      titleElementIG.style.letterSpacing = "-0.5px";
      titleElementIG.style.top = "2530px";
      indicator.className = "";
      indicator.textContent = "2 LINE";
      indicator.classList.add("style-2");
      requestAnimationFrame(() => {
        const style2 = window.getComputedStyle(titleElementYT);
        const lh2 = parseFloat(style2.lineHeight) || 1.1 * fontSize2;
        let h2 = titleElementYT.clientHeight;
        let fits2 = h2 <= Math.ceil(lh2 * 2.05);
        if (!fits2) {
          // Try 3 Line style
          titleElementYT.style.fontSize = fontSize3 + "px";
          titleElementIG.style.fontSize = fontSize3_IG + "px";
          titleElementIG.textContent = originalText;
          indicator.className = "";
          indicator.textContent = "3 LINE";
          indicator.classList.add("style-3");
          // No further checks needed; 3 Line is the smallest
        }
      });
    }
  });
}

function downloadCanvas(canvas, filename){
  canvas.toBlob(function(blob){
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;

    document.body.appendChild(a);
    a.click();
    a.remove();

    setTimeout(()=>URL.revokeObjectURL(url),1000);

  },"image/jpeg",0.95);
}

function drawTextYT(ctx) {
  const textElement = document.getElementById("titleTextYT");
  const text = textElement.textContent.split("\n");
  const style = window.getComputedStyle(textElement);

  ctx.fillStyle = "white";
  ctx.textAlign = "right";
  ctx.font = style.fontSize + " Rubik";

  const lineHeight = parseFloat(style.lineHeight);
  let y = 620;

  text.forEach(line => {
    ctx.fillText(line, 1920 - 117, y);
    y += lineHeight;
  });
  const commentatorElement = document.getElementById("commentatorTextYT");
  const commentatorText = commentatorElement.textContent;

  if (commentatorText) {
    const commentatorStyle = window.getComputedStyle(commentatorElement);
    ctx.font = commentatorStyle.fontSize + " Rubik";
    ctx.fillStyle = commentatorStyle.color;
    ctx.fillText(commentatorText, 1920 - 117, 930);
  }
}

function downloadYT(){

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 1920;
  canvas.height = 1080;

  const overlaySrc = document.getElementById("graphicsOverlayYT").getAttribute("src");

  function finishYT() {
    if (overlaySrc) {
      const gfx = new Image();
      gfx.onload = function() {
        ctx.drawImage(gfx,0,0,1920,1080);
        drawTextYT(ctx);
        downloadCanvas(canvas,bgNameYT+"_Upload.jpg");
      };
      gfx.src = overlaySrc;
    } else {
      drawTextYT(ctx);
      downloadCanvas(canvas,bgNameYT+"_Upload.jpg");
    }
  }

  if (currentShow === "UC") {
    finishYT();
    return;
  }

  const img = new Image();
  img.src = bgImageYT;

  img.onload = function(){
    ctx.drawImage(img, photoOffsetYT, 0, 1920, 1080);
    finishYT();
  }
}

function downloadIG(){

  if (currentShow === "PS" && bgImageYT) {
    syncPSImageToIG();
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 3000;
  canvas.height = 3000;

  const img = new Image();
  img.src = bgImageIG;

  img.onload = function(){

    const scale = 3000 / 1920;
    const igOffset = photoOffsetYT * scale;

    // emulate CSS object-fit: cover
    const coverScale = Math.max(3000 / img.width, 3000 / img.height);
    const drawWidth = img.width * coverScale;
    const drawHeight = img.height * coverScale;

    // center image first
    let x = (3000 - drawWidth) / 2;
    let y = (3000 - drawHeight) / 2;

    // apply horizontal offset (panning)
    x += igOffset;

    ctx.drawImage(img, x, y, drawWidth, drawHeight);

    const textElement = document.getElementById("titleTextIG");
    const rawText = textElement.textContent;
    const words = rawText.split(" ");
    const maxWidth = 2550;
    let lines = [];
    let currentLine = "";

    words.forEach(word => {
      const testLine = currentLine ? currentLine + " " + word : word;
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && currentLine !== "") {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });

    if (currentLine) lines.push(currentLine);

    const style = window.getComputedStyle(textElement);

    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = style.fontSize + " Rubik";

    const lineHeight = parseFloat(style.lineHeight);

    const igTop = parseFloat(window.getComputedStyle(textElement).top) || 2520;
    const centerY = igTop; // same vertical anchor as current CSS

    const totalHeight = (lines.length - 1) * lineHeight;

    let textY = centerY - totalHeight / 2;

    lines.forEach(line=>{
      ctx.fillText(line,1500,textY);
      textY += lineHeight;
    });

    const commentatorElement = document.getElementById("commentatorTextIG");
    const commentatorText = commentatorElement.textContent;

    if (commentatorText) {
      const commentatorStyle = window.getComputedStyle(commentatorElement);
      ctx.font = commentatorStyle.fontSize + " Rubik";
      ctx.fillStyle = commentatorStyle.color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(commentatorText, 1500, 2810);
    }

    const footerElement = document.getElementById("footerTextIG");
    const footerText = footerElement.textContent;

    if (footerText) {
      const footerStyle = window.getComputedStyle(footerElement);
      const footerTop = parseFloat(footerStyle.top) || 2935;
      ctx.font = footerStyle.fontSize + " Rubik";
      ctx.fillStyle = footerStyle.color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(footerText, 1500, footerTop);
    }

    downloadCanvas(canvas,bgNameIG+"_Upload.jpg");

  }
}

function downloadBoth(){

  downloadYT();

  setTimeout(()=>{
    downloadIG();
  },400);

}
function updatePreviewScales() {
  const ytStage = document.querySelector('.previewStage');
  const igStage = document.querySelector('.previewStage.square');
  const ytScaleEl = document.getElementById('previewScaleYT');
  const igScaleEl = document.getElementById('previewScaleIG');

  if (ytStage && ytScaleEl) {
    const ytScale = Math.min(1, ytStage.clientWidth / 1920);
    ytScaleEl.style.transform = `translateX(-50%) scale(${ytScale})`;
    ytStage.style.height = (1080 * ytScale) + 'px';
  }

  if (igStage && igScaleEl) {
    const igScale = Math.min(1, igStage.clientWidth / 3000);
    igScaleEl.style.transform = `translateX(-50%) scale(${igScale})`;
    igStage.style.height = (3000 * igScale) + 'px';
  }
}

window.addEventListener("DOMContentLoaded", function() {
  updateCommentatorVisibility();
  updateGraphicsByShow();
  updateYTVisibility();
  updatePreviewScales();
});

window.addEventListener('resize', updatePreviewScales);
</script>

</body>
</html>
