<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thumbnail Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500&display=swap" rel="stylesheet">

<style>
body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
}

.controls {
    width: 100%;
    height: auto;
    margin: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

}




#thumbnail{
  position: relative;
  width: 1920px;
  height: 1080px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
}

#titleText {
  position: absolute;
  width: 840px;
  top: 620px;
  right: 117px;
  text-align: right;
  color: white;
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 73px;
  line-height: 1.1;
  white-space: pre-line;
  letter-spacing: -0.5px;
}

#styleIndicator {
  font-family: 'Rubik', sans-serif;
  font-weight: 500;
  font-size: 28px;
  padding: 12px 20px;
  text-align: center;
  border-radius: 8px;
  margin-top: 10px;
  display: inline-block;
  min-width: 160px;
  color: white;
}

.style-1 {
  background-color: #2ecc71;
}

.style-2 {
  background-color: #e74c3c;
}

.style-3 {
  background-color: #3c72e7;
}

.controls *{
  width: 80%;
  height: 50px;
  margin-bottom: 20px;
  justify-self: center;
  font-weight: 600;

}


#bgUpload::file-selector-button {
  width: 100%;
  height: 50px;
  border: none;
}



</style>
</head>

<body>

<div class="controls">
  <input type="file" id="bgUpload" accept="image/*">
  <textarea id="titleInput" rows="3" cols="40" placeholder="Enter title"></textarea><br><br>
  <div id="styleIndicator">1 LINE</div><br>
  <button id="generateBtn" onclick="generate()">Generate</button>
  <button onclick="download()">Download JPG</button>
<br><br>
</div>

<div id="thumbnail">
    <div id="titleText"></div>
</div>


<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let bgImageData = "";


document.getElementById("bgUpload").addEventListener("change", function(e) {
  const reader = new FileReader();
  reader.onload = function(event) {
    bgImageData = event.target.result;
    document.getElementById("thumbnail").style.backgroundImage = `url(${bgImageData})`;
  };
  reader.readAsDataURL(e.target.files[0]);
});

// Auto-generate instantly when text changes
const titleInput = document.getElementById("titleInput");

titleInput.addEventListener("input", function() {
  generate();
});

function generate() {
  const rawInput = document.getElementById("titleInput").value.trim();
  const upperText = rawInput.toUpperCase();
  const titleElement = document.getElementById("titleText");
  const indicator = document.getElementById("styleIndicator");

  // Add quotes as one single text
  const finalText = "„" + upperText + "“";
  titleElement.textContent = finalText;
  titleElement.style.whiteSpace = "pre-line";

  // Set to 1 Line style first
  titleElement.style.fontSize = "73px";
  indicator.className = "";
  indicator.textContent = "1 LINE";
  indicator.classList.add("style-1");

  // Wait for DOM update to check overflow
  // Get the computed style height for 1 line, 2 lines, and 3 lines
  // We'll use the clientHeight of the titleElement to compare
  // Height threshold for 1 line: allow up to 1 line of text at 73px, etc.
  // The element's height should not exceed 1x, 2x, or 3x of its font size * line-height
  // Use requestAnimationFrame to wait for the DOM to update
  requestAnimationFrame(() => {
    // Get computed line height in px
    const computedStyle = window.getComputedStyle(titleElement);
    const fontSize1 = 73, fontSize2 = 60, fontSize3 = 52;
    const lineHeight = parseFloat(computedStyle.lineHeight) || 1.1 * fontSize1;
    // The titleElement's clientHeight
    let h = titleElement.clientHeight;
    // For 1 line: should fit within 1 line
    let fits = h <= Math.ceil(lineHeight * 1.05); // small fudge
    if (!fits) {
      // Try 2 Line style
      titleElement.style.fontSize = fontSize2 + "px";
      indicator.className = "";
      indicator.textContent = "2 LINE";
      indicator.classList.add("style-2");
      requestAnimationFrame(() => {
        const style2 = window.getComputedStyle(titleElement);
        const lh2 = parseFloat(style2.lineHeight) || 1.1 * fontSize2;
        let h2 = titleElement.clientHeight;
        let fits2 = h2 <= Math.ceil(lh2 * 2.05);
        if (!fits2) {
          // Try 3 Line style
          titleElement.style.fontSize = fontSize3 + "px";
          indicator.className = "";
          indicator.textContent = "3 LINE";
          indicator.classList.add("style-3");
          // No further checks needed; 3 Line is the smallest
        }
      });
    }
  });
}

function download() {
  html2canvas(document.querySelector("#thumbnail"), {
    width: 1920,
    height: 1080,
    scale: 1
  }).then(canvas => {
    const imageData = canvas.toDataURL("image/jpeg", 1.0);

    // iOS Safari fix: open image in new tab instead of forcing download
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

    if (isIOS) {
      window.open(imageData, '_blank');
    } else {
      const link = document.createElement("a");
      link.download = "thumbnail.jpg";
      link.href = imageData;
      link.click();
    }
  });
}
</script>

</body>
</html>
